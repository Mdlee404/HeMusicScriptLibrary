name: Validate Scripts

on:
  push:
    branches:
      - main
    paths:
      - 'sources/**'
  pull_request:
    paths:
      - 'sources/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate and Build
        run: npm run build
