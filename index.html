<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeMusicScriptLibrary 音源索引</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --text-color: #4a4a4a;
            --panel-bg: rgba(255, 255, 255, 0.62);
            --line: rgba(255, 117, 140, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ffe6fa 100%);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-color);
        }

        #sakuraCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 40px 20px;
        }

        .glass-container {
            width: min(1080px, 95vw);
            max-height: calc(100vh - 80px);
            overflow: auto;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(255, 118, 163, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(24px);
        }

        h1 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
            font-size: clamp(1.7rem, 2.4vw, 2.4rem);
            letter-spacing: 1.5px;
        }

        .sub {
            margin: 8px 0 18px;
            font-size: 0.98rem;
            opacity: 0.85;
        }

        .team-brand {
            display: inline-block;
            margin-bottom: 16px;
            padding: 8px 18px;
            background: rgba(255, 117, 140, 0.1);
            border-radius: 999px;
            color: #ff5277;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255,255,255,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        thead th {
            text-align: left;
            background: rgba(255, 117, 140, 0.08);
            color: #b63862;
            font-weight: 700;
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px dashed rgba(255, 117, 140, 0.15);
            vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }

        .file-link {
            color: #8d2d5a;
            text-decoration: none;
            font-weight: 600;
        }
        .file-link:hover { text-decoration: underline; }

        .badge {
            display: inline-block;
            border-radius: 999px;
            font-size: 12px;
            padding: 2px 10px;
            font-weight: 700;
        }
        .ok { background: rgba(76, 175, 80, 0.15); color: #1f7a33; }
        .warn { background: rgba(251, 192, 45, 0.22); color: #8a6000; }

        #interactive-cat {
            position: fixed;
            bottom: -10px;
            right: 5%;
            width: 140px;
            height: 140px;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 15px rgba(255, 118, 163, 0.3));
        }
        #interactive-cat:hover { transform: translateY(-8px); }
        #cat-tail { transform-origin: 160px 160px; animation: tailWag 3s ease-in-out infinite; }
        #meow-bubble {
            position: absolute;
            top: -20px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 118, 163, 0.3);
            padding: 6px 14px;
            border-radius: 12px 12px 12px 0;
            font-size: 14px;
            color: #ff5277;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transform: translateY(10px);
            white-space: nowrap;
        }
        #eyes-group { transition: transform 0.15s; transform-origin: 100px 125px; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes tailWag { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }

        @media (max-width: 780px) {
            .glass-container { padding: 20px; }
            thead th:nth-child(2), td:nth-child(2) { display: none; }
            #interactive-cat { width: 110px; height: 110px; right: 3%; }
        }
    </style>
</head>
<body>
    <canvas id="sakuraCanvas"></canvas>

    <main class="page">
        <section class="glass-container">
            <h1>HeMusicScriptLibrary 音源索引</h1>
            <p class="sub" id="summary">正在加载 sources.json ...</p>
            <div class="team-brand">可直链下载 · 实时索引</div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>脚本文件</th>
                            <th>大小</th>
                            <th>更新时间</th>
                            <th>验证状态</th>
                        </tr>
                    </thead>
                    <tbody id="list"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="interactive-cat" aria-label="互动小猫">
        <div id="meow-bubble">欢迎来逛音源库喵~</div>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <path id="cat-tail" d="M 130 150 Q 180 180 170 100" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
            <path d="M 45 200 C 45 130 155 130 155 200 Z" fill="#fff"/>
            <polygon points="140,120 160,60 110,100" fill="#fff"/>
            <polygon points="138,110 154,70 120,98" fill="#ffe6fa"/>
            <polygon points="60,120 40,60 90,100" fill="#fff"/>
            <polygon points="62,110 46,70 80,98" fill="#ffe6fa"/>
            <ellipse cx="100" cy="130" rx="55" ry="45" fill="#fff"/>
            <g id="eyes-group">
                <ellipse cx="75" cy="125" rx="10" ry="12" fill="#fff" stroke="#f0f0f0" stroke-width="2"/>
                <ellipse cx="125" cy="125" rx="10" ry="12" fill="#fff" stroke="#f0f0f0" stroke-width="2"/>
                <g id="pupils">
                    <circle cx="75" cy="125" r="7" fill="#4a4a4a"/>
                    <circle cx="125" cy="125" r="7" fill="#4a4a4a"/>
                    <circle cx="73" cy="122" r="2" fill="#fff"/>
                    <circle cx="123" cy="122" r="2" fill="#fff"/>
                </g>
            </g>
            <polygon points="97,138 103,138 100,142" fill="#ffb3e6"/>
            <path d="M 90 145 Q 95 152 100 145 Q 105 152 110 145" fill="none" stroke="#ffb3e6" stroke-width="2" stroke-linecap="round"/>
            <ellipse cx="60" cy="138" rx="8" ry="4" fill="#ffb3e6" opacity="0.5"/>
            <ellipse cx="140" cy="138" rx="8" ry="4" fill="#ffb3e6" opacity="0.5"/>
        </svg>
    </div>

    <script>
        async function loadSources() {
            const summary = document.getElementById('summary');
            const list = document.getElementById('list');
            try {
                const resp = await fetch('./sources.json', { cache: 'no-store' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const sources = Array.isArray(data.sources) ? data.sources : [];
                summary.textContent = `共 ${sources.length} 个脚本，点击文件名可直接查看。`;

                list.innerHTML = sources.map(item => {
                    const validated = item.validated === true;
                    const badgeClass = validated ? 'ok' : 'warn';
                    const badgeText = validated ? '已验证' : '未验证';
                    const size = typeof item.size === 'number' ? `${item.size} KB` : '-';
                    return `
                        <tr>
                            <td><a class="file-link" href="./sources/${encodeURIComponent(item.name)}" target="_blank" rel="noopener">${item.name}</a></td>
                            <td>${size}</td>
                            <td>${item.updateTime || '-'}</td>
                            <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                summary.textContent = `加载失败：${error.message}`;
                list.innerHTML = '<tr><td colspan="4">无法读取 sources.json</td></tr>';
            }
        }

        const canvas = document.getElementById('sakuraCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const petals = [];
        const numPetals = 65;
        class Petal {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = 8 + Math.random() * 8;
                this.speedY = 1 + Math.random() * 1.5;
                this.speedX = -1 + Math.random() * 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = -0.05 + Math.random() * 0.1;
                this.flip = Math.random();
                this.flipSpeed = Math.random() * 0.05;
                this.opacity = 0.5 + Math.random() * 0.5;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                this.flip += this.flipSpeed;
                this.speedX += (Math.random() - 0.5) * 0.03;
                this.speedX = Math.max(-2.5, Math.min(2.5, this.speedX));
                if (this.y > canvas.height + this.size || this.x < -this.size || this.x > canvas.width + this.size) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(Math.sin(this.flip), 1);
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size / 2, -this.size / 1.5, this.size, this.size / 3, 0, this.size);
                ctx.bezierCurveTo(-this.size, this.size / 3, -this.size / 2, -this.size / 1.5, 0, 0);
                ctx.closePath();
                const gradient = ctx.createLinearGradient(0, 0, 0, this.size);
                gradient.addColorStop(0, '#ffb3e6');
                gradient.addColorStop(1, '#ff80cc');
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.restore();
            }
        }
        for (let i = 0; i < numPetals; i++) petals.push(new Petal());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const p of petals) { p.update(); p.draw(); }
            requestAnimationFrame(animate);
        }

        const cat = document.getElementById('interactive-cat');
        const pupils = document.getElementById('pupils');
        const bubble = document.getElementById('meow-bubble');
        const eyesGroup = document.getElementById('eyes-group');
        let meowTimeout;

        document.addEventListener('mousemove', (e) => {
            const rect = cat.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height * 0.6;
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            const angle = Math.atan2(dy, dx);
            const distance = Math.min(Math.hypot(dx, dy) / 60, 4);
            pupils.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
        });

        cat.addEventListener('click', () => {
            cat.style.transform = 'translateY(-30px) scale(1.05)';
            setTimeout(() => { cat.style.transform = ''; }, 300);
            bubble.style.opacity = '1';
            bubble.style.transform = 'translateY(-10px)';
            clearTimeout(meowTimeout);
            meowTimeout = setTimeout(() => {
                bubble.style.opacity = '0';
                bubble.style.transform = 'translateY(10px)';
            }, 2000);
        });

        function randomBlink() {
            eyesGroup.style.transform = 'scaleY(0.1)';
            setTimeout(() => { eyesGroup.style.transform = 'scaleY(1)'; }, 150);
            setTimeout(randomBlink, 2000 + Math.random() * 4000);
        }

        loadSources();
        animate();
        setTimeout(randomBlink, 2000);
    </script>
</body>
</html>
